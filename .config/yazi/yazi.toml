#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
mouse_events = [ "click", "scroll" ]

[preview]
max_width = 2000
max_height = 1000

[opener]
play = [
	{ run = 'mpv --force-window %s', orphan = true, for = "unix" },
	{ run = '''mediainfo %s1; echo "Press enter to exit"; read _''', block = true, desc = "Show media info", for = "unix" },
]
mpv_audio = [
	{ run = 'mpv %s', block = true, for = "unix" },
]

[open]
rules = [
	{ url = "*/", use = [ "edit", "open", "reveal" ] },
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "image/*", use = [ "open", "reveal" ] },
	{ url = "*.m4a", use = ["mpv_audio", "reveal"] },
	{ mime = "audio/*", use = ["mpv_audio", "reveal"] },
	{ mime = "video/*", use = ["play", "reveal"] },
	{ mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "reveal" ] },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	{ mime = "vfs/{absent,stale}", use = "download" },
	{ url = "*", use = [ "open", "reveal" ] },
]

[tasks]
image_bound = [0, 0]

[plugin]
prepend_preloaders = [
	{ url = "/home/bczhc/smb/**", run = "noop" },
	{ url = "/mnt/sr0/**", run = "noop" },
]
prepend_fetchers = [
	{ group = "git", url = "*", run = "git" },
	{ group = "git", url = "*/", run = "git" },
]
prepend_previewers = [
	{ url = "*.m4a", run = "file" },
]
append_previewers = [
	{ url = "*", run = "file-extra-metadata" },
]
